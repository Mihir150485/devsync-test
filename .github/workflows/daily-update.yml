name: DevSync Daily Commit

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write   # ⭐ gives workflow permission to push

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 21f3000401@ds.study.iitm.ac.in update log
        run: echo "Updated on $(date)" >> devsync-log.txt

      - name: Commit and push
        run: |
          git config user.name "DevSync Automation"
          git config user.email "21f3000401@ds.study.iitm.ac.in"
          git add .
          git commit -m "Daily automated commit" || echo "No changes"
          git push